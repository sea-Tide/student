<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel" aria-labelledby="loginTitle">
        <div class="brand-block">
            <span class="brand-mark">S</span>
            <div>
                <h1 id="loginTitle">学生信息管理系统</h1>
                <p>Student Information Management</p>
            </div>
        </div>

        <form id="loginForm" class="form-stack auth-form" autocomplete="on">
            <label class="field">
                <span>账号</span>
                <input id="username" name="username" type="text" autocomplete="username" required autofocus>
            </label>
            <label class="field">
                <span>密码</span>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </label>
            <p id="loginMessage" class="message" role="alert"></p>
            <button id="loginButton" class="button primary full" type="submit">登录</button>
            <div class="auth-links">
                <button class="text-button" type="button" data-mode="register">注册账号</button>
                <button class="text-button" type="button" data-mode="password">修改密码</button>
            </div>
        </form>

        <form id="registerForm" class="form-stack auth-form hidden" autocomplete="on" hidden>
            <label class="field">
                <span>账号</span>
                <input name="username" type="text" autocomplete="username" maxlength="50" required>
            </label>
            <label class="field">
                <span>显示名称</span>
                <input name="displayName" type="text" maxlength="80" required>
            </label>
            <label class="field">
                <span>密码</span>
                <input name="password" type="password" autocomplete="new-password" maxlength="100" required>
            </label>
            <label class="field">
                <span>确认密码</span>
                <input name="confirmPassword" type="password" autocomplete="new-password" maxlength="100" required>
            </label>
            <p id="registerMessage" class="message" role="alert"></p>
            <button id="registerButton" class="button primary full" type="submit">注册</button>
            <div class="auth-links single">
                <button class="text-button" type="button" data-mode="login">返回登录</button>
            </div>
        </form>

        <form id="passwordForm" class="form-stack auth-form hidden" autocomplete="on" hidden>
            <label class="field">
                <span>账号</span>
                <input name="username" type="text" autocomplete="username" maxlength="50" required>
            </label>
            <label class="field">
                <span>原密码</span>
                <input name="oldPassword" type="password" autocomplete="current-password" maxlength="100" required>
            </label>
            <label class="field">
                <span>新密码</span>
                <input name="newPassword" type="password" autocomplete="new-password" maxlength="100" required>
            </label>
            <label class="field">
                <span>确认新密码</span>
                <input name="confirmPassword" type="password" autocomplete="new-password" maxlength="100" required>
            </label>
            <p id="passwordMessage" class="message" role="alert"></p>
            <button id="passwordButton" class="button primary full" type="submit">保存新密码</button>
            <div class="auth-links single">
                <button class="text-button" type="button" data-mode="login">返回登录</button>
            </div>
        </form>
    </section>
</main>
<script src="/assets/request.js"></script>
<script>
    const modeButtons = document.querySelectorAll("[data-mode]");
    const loginForm = document.querySelector("#loginForm");
    const registerForm = document.querySelector("#registerForm");
    const passwordForm = document.querySelector("#passwordForm");
    const loginButton = document.querySelector("#loginButton");
    const registerButton = document.querySelector("#registerButton");
    const passwordButton = document.querySelector("#passwordButton");
    const loginMessage = document.querySelector("#loginMessage");
    const registerMessage = document.querySelector("#registerMessage");
    const passwordMessage = document.querySelector("#passwordMessage");

    api.get("/api/users/me")
        .then(() => {
            window.location.href = "/students.html"; // 已有登录信息，直接跳转到首页
        })
        .catch(() => {
        });

    function switchMode(mode) {
        loginForm.hidden = mode !== "login";
        registerForm.hidden = mode !== "register";
        passwordForm.hidden = mode !== "password";
        loginForm.classList.toggle("hidden", loginForm.hidden);
        registerForm.classList.toggle("hidden", registerForm.hidden);
        passwordForm.classList.toggle("hidden", passwordForm.hidden);
        loginMessage.textContent = "";
        registerMessage.textContent = "";
        passwordMessage.textContent = "";
        if (mode === "login") {
            loginForm.elements.username.focus();
        }
        if (mode === "register") {
            registerForm.elements.username.focus();
        }
        if (mode === "password") {
            passwordForm.elements.username.focus();
        }
    }

    function setMessage(element, text, success) {
        element.textContent = text;
        element.classList.toggle("success", Boolean(success));
    }

    modeButtons.forEach((button) => {
        button.addEventListener("click", () => switchMode(button.dataset.mode));
    });

    // 登录提交的表单
    loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage(loginMessage, "", false);
        loginButton.disabled = true;
        loginButton.textContent = "登录中";
        try {
            await api.post("/api/users/login", {
                username: loginForm.elements.username.value,
                password: loginForm.elements.password.value
            });
            window.location.href = "/students.html";
        } catch (error) {
            setMessage(loginMessage, error.message, false);
        } finally { // 恢复按钮状态
            loginButton.disabled = false; // 防止重复提交表单
            loginButton.textContent = "登录";
        }
    });

    // 注册提交的表单
    registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage(registerMessage, "", false);
        registerButton.disabled = true;
        registerButton.textContent = "注册中";
        try {
            await api.post("/api/users/register", {
                username: registerForm.elements.username.value,
                displayName: registerForm.elements.displayName.value,
                password: registerForm.elements.password.value,
                confirmPassword: registerForm.elements.confirmPassword.value
            });
            const username = registerForm.elements.username.value;
            registerForm.reset();
            loginForm.elements.username.value = username;
            loginForm.elements.password.value = "";
            switchMode("login");
            setMessage(loginMessage, "注册成功，请登录", true);
            loginForm.elements.password.focus();
        } catch (error) {
            setMessage(registerMessage, error.message, false);
        } finally {
            registerButton.disabled = false;
            registerButton.textContent = "注册";
        }
    });

    // 修改密码提交的表单
    passwordForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage(passwordMessage, "", false);
        passwordButton.disabled = true;
        passwordButton.textContent = "保存中";
        try {
            await api.post("/api/users/password", {
                username: passwordForm.elements.username.value,
                oldPassword: passwordForm.elements.oldPassword.value,
                newPassword: passwordForm.elements.newPassword.value,
                confirmPassword: passwordForm.elements.confirmPassword.value
            });
            const username = passwordForm.elements.username.value;
            passwordForm.reset();
            loginForm.elements.username.value = username;
            loginForm.elements.password.value = "";
            switchMode("login");
            setMessage(loginMessage, "密码修改成功，请重新登录", true);
            loginForm.elements.password.focus();
        } catch (error) {
            setMessage(passwordMessage, error.message, false);
        } finally {
            passwordButton.disabled = false;
            passwordButton.textContent = "保存新密码";
        }
    });
</script>
</body>
</html>
